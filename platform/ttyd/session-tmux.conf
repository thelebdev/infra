# tmux configuration for the browser-served terminal sessions.
#
# Applied to the per-user tmux servers started by the `session` helper and by
# the session-manager API — both pass it with `tmux -f`. It is kept separate
# from any operator ~/.tmux.conf so neither file clobbers the other.

# --- mouse ----------------------------------------------------------------
# Without this, a browser terminal translates the scroll wheel into arrow-key
# presses: scrolling up "walks back through your command history" instead of
# scrolling the pane. `mouse on` makes tmux own the wheel, so scrolling up
# enters copy-mode and scrolls the actual scrollback. It also enables
# click-to-select for panes and windows.
set -g mouse on

# Generous scrollback so you can scroll far back through a long agent run.
set -g history-limit 100000

# These sessions are meant to outlive every client. Never tear one down just
# because the last browser tab detached.
set -g destroy-unattached off

# Keep re-attaching clients from being constrained to the smallest window —
# size to the largest currently-attached client instead.
setw -g aggressive-resize on

# Snappier Escape handling for any TUI running inside.
set -sg escape-time 10

# --- status bar -----------------------------------------------------------
# Make it obvious which named session this browser tab is attached to, and
# how to leave without killing it.
set -g status on
set -g status-interval 5
set -g status-style "bg=colour236,fg=colour250"
set -g status-left  "#[bg=colour24,fg=colour231,bold] session #[default] "
set -g status-left-length 16
set -g status-right "#[fg=colour110]#S#[default]  ·  Ctrl-b d detaches "
set -g status-right-length 48

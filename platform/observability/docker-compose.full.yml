# Full observability profile — for servers with >= 2 GiB RAM.
# Loki + Promtail + Prometheus + node-exporter + Grafana.
# Same security model: every UI binds ONLY to 127.0.0.1, reached from outside
# through Caddy (basic auth + TLS). Do NOT select this profile on ~1 GiB boxes.

services:
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./config/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    mem_limit: 512m

  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    mem_limit: 256m

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./config/prometheus-config.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    mem_limit: 512m

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command: ["--path.rootfs=/host"]
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    mem_limit: 64m

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [loki, prometheus]
    mem_limit: 256m

volumes:
  loki_data:
  prometheus_data:
  grafana_data:

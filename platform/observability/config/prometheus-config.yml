# Prometheus: scrape host metrics + any container labelled for scraping.
# Full profile only.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['localhost:9100']   # node-exporter (host network)

  # Application containers opt in via labels (see docs/PLATFORM_API.md):
  #   prometheus.scrape=true, prometheus.port=<port>, prometheus.path=<path>
  - job_name: docker-apps
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_prometheus_scrape']
        regex: 'true'
        action: keep
      - source_labels: ['__meta_docker_container_label_prometheus_port']
        target_label: __address__
        regex: '(.+)'
        replacement: '${1}'
